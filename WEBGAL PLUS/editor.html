<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebGal 编辑器</title>
<style>
:root{--bg:#ffffff;--b2:#f8fafc;--tx:#1e293b;--muted:#94a3b8;--pri:#2563eb;--bd:#e2e8f0;--good:#16a34a;--bad:#dc2626;--warn:#d97706;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font:13px/1.5 -apple-system,system-ui,sans-serif;background:#f1f5f9;color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
/* 顶栏 */
.top{background:var(--bg);border-bottom:1px solid var(--bd);padding:6px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.top h1{font-size:15px;color:var(--pri);margin-right:8px;}
.top .sep{width:1px;height:20px;background:var(--bd);margin:0 4px;}
.btn{padding:5px 12px;border:1px solid var(--bd);border-radius:5px;background:var(--bg);cursor:pointer;font-size:12px;white-space:nowrap;transition:.12s;color:var(--tx);}
.btn:hover{background:#eff6ff;border-color:var(--pri);}
.btn.a{background:var(--pri);color:#fff;border-color:var(--pri);}
.btn.a:hover{background:#1d4ed8;}
.btn.s{padding:3px 8px;font-size:11px;}
/* 警告条 */
.alert{display:none;padding:6px 14px;background:#fef3c7;color:#92400e;font-size:12px;text-align:center;flex-shrink:0;border-bottom:1px solid #fcd34d;}
.alert.show{display:block;}
/* 主三栏 */
.main{display:flex;flex:1;overflow:hidden;}
/* 左栏 */
.left{width:230px;background:var(--bg);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.lh{padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.3px;border-bottom:1px solid var(--bd);text-transform:uppercase;}
.fl{flex:1;overflow-y:auto;padding:4px;}
.fi{padding:5px 8px;font-size:12px;cursor:pointer;border-radius:4px;display:flex;align-items:center;gap:5px;}
.fi:hover{background:#eff6ff;}
.fi.on{background:#dbeafe;color:var(--pri);font-weight:600;}
.fi .sz{font-size:10px;color:var(--muted);margin-left:auto;}
.st{flex:1;overflow-y:auto;padding:4px;border-top:1px solid var(--bd);display:none;}
.st .l{padding:3px 6px;font-size:11px;cursor:pointer;border-radius:3px;display:flex;gap:4px;align-items:center;}
.st .l:hover{background:#eff6ff;}
.st .l .d{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.st .l .d.lb{background:var(--pri);}
.st .l .d.ch{background:var(--warn);}
/* 右栏 */
.right{width:260px;background:var(--bg);border-left:1px solid var(--bd);overflow-y:auto;flex-shrink:0;display:none;}
.rs{padding:8px 10px;border-bottom:1px solid var(--bd);}
.rst{padding:8px 10px;font-size:11px;font-weight:600;color:var(--pri);cursor:pointer;display:flex;justify-content:space-between;}
.rst:hover{background:var(--b2);}
.rsb{padding:6px 10px;font-size:11px;max-height:180px;overflow-y:auto;}
.rsb.hide{display:none;}
.tag{display:inline-block;padding:1px 7px;border-radius:9px;font-size:10px;margin:1px;}
.tag.c{background:#eff6ff;border:1px solid #bfdbfe;color:var(--pri);}
.tag.b{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;}
.tag.f{background:#f5f3ff;border:1px solid #c4b5fd;color:#5b21b6;}
.tag.m{background:#fffbeb;border:1px solid #fcd34d;color:#92400e;}
.tag.e{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;}
/* 编辑器 */
.ed{flex:1;display:flex;flex-direction:column;overflow:hidden;}
/* 工具栏 */
.tb2{display:flex;gap:3px;padding:5px 10px;background:var(--bg);border-bottom:1px solid var(--bd);flex-wrap:wrap;flex-shrink:0;}
.tb2 .btn{font-size:11px;padding:3px 8px;}
.tb2 .lbl{font-size:10px;color:var(--muted);padding:4px 6px;}
/* textarea */
.ta{flex:1;border:none;outline:none;resize:none;padding:14px 18px;font:13px/1.65 "Cascadia Code","Fira Code","Consolas",monospace;background:var(--b2);color:var(--tx);tab-size:2;}
/* 状态栏 */
.sb{background:var(--bg);border-top:1px solid var(--bd);padding:4px 14px;font-size:11px;display:flex;gap:14px;align-items:center;flex-shrink:0;}
.sb .it{display:flex;align-items:center;gap:4px;}
.svok{color:var(--good);font-weight:600;}
.sverr{color:var(--bad);font-weight:600;}
.svsav{color:var(--warn);}
.sb .git{color:var(--warn);cursor:pointer;}
.sb .git:hover{text-decoration:underline;}
/* 工具提示 */
.tt{display:none;position:fixed;background:#1e293b;color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;z-index:999;pointer-events:none;}
/* 模态 */
.mod{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none;align-items:center;justify-content:center;}
.mod.s{display:flex;}
.mod>div{background:var(--bg);border-radius:10px;padding:20px;width:520px;max-height:80vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.12);}
.mod h3{color:var(--pri);margin-bottom:10px;font-size:15px;}
.mod input,.mod textarea,.mod select{width:100%;padding:7px;border:1px solid var(--bd);border-radius:5px;font-size:12px;margin:4px 0;font-family:inherit;}
.mod textarea{min-height:70px;resize:vertical;}
.mod .row{display:flex;gap:8px;margin-bottom:6px;}
.mod .row>*{flex:1;}
.mod .act{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;}
.lbf{font-size:11px;color:var(--muted);margin-bottom:2px;}
/* 滚动条 */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
</style>
</head>
<body>

<div class="top">
  <h1>WebGal 编辑器</h1>
  <span style="font-size:10px;color:var(--muted);">GITHUBOPEN</span>
  <span class="sep"></span>
  <button class="btn a" onclick="loadFiles()">📂 加载文件</button>
  <button class="btn" onclick="newFile()">📄 新建</button>
  <button class="btn" onclick="saveNow()">💾 保存</button>
  <button class="btn" onclick="toggleRight()">🔍 分析</button>
  <button class="btn" onclick="openDialogBuilder()">💬 对话</button>
  <button class="btn" onclick="openAIPanel()">🤖 AI</button>
  <button class="btn" onclick="gitCommit()">📝 提交</button>
  <span class="sep"></span>
  <span id="aiBadge" style="font-size:10px;color:var(--muted)" title="AI 状态">🤖 检测中</span>
  <span style="font-size:10px;color:var(--muted);">Ctrl+S 保存 · 拖拽导入</span>
</div>

<div class="alert" id="alert">⚠️ 文件同步服务未连接 — 请运行 node tools/server.js。修改无法保存到磁盘。</div>

<div class="main">
  <div class="left">
    <div class="lh">📁 场景文件</div>
    <div class="fl" id="fl"><div style="padding:16px;text-align:center;color:var(--muted);">点击「📂 加载文件」</div></div>
    <div class="st" id="st"></div>
  </div>

  <div class="ed">
    <div class="tb2">
      <span class="lbl">快捷插入:</span>
      <button class="btn s" onclick="ins('\n角色名:;')">💬对话</button>
      <button class="btn s" onclick="ins('\n:旁白;')">📝旁白</button>
      <button class="btn s" onclick="ins('\nchangeBg:.png;')">🏞背景</button>
      <button class="btn s" onclick="ins('\nchangeFigure:.png -center;')">🎭立绘</button>
      <button class="btn s" onclick="ins('\nchoose:选项1:l1|选项2:l2;\nlabel:l1;\n:选了1;\njumpLabel:end;\nlabel:l2;\n:选了2;\njumpLabel:end;\nlabel:end;')">🔀分支</button>
      <button class="btn s" onclick="ins('\nlabel:xxx;\njumpLabel:xxx;')">🏷跳转</button>
      <button class="btn s" onclick="ins('\nbgm:.mp3;')">🎵BGM</button>
      <button class="btn s" onclick="ins('\nsetVar:var=0;')">📐变量</button>
      <button class="btn s" onclick="ins('\nplayVideo:.mp4;')">🎬视频</button>
      <button class="btn s" onclick="ins('\nwait:1000;')">⏱等待</button>
      <button class="btn s" onclick="ins('\nchangeScene:.txt;')">📄场景</button>
      <button class="btn s" onclick="ins('\nend;')">⏹结束</button>
    </div>
    <textarea class="ta" id="ta" placeholder="在此编辑 WebGal 脚本...
快捷插入: 上方工具栏
Ctrl+S: 保存  |  停止输入2秒: 自动保存
拖拽 .txt 文件到此处导入"></textarea>
  </div>

  <div class="right" id="rp">
    <div class="rs"><div class="rst" onclick="this.nextElementSibling.classList.toggle('hide')">📊 统计 ▼</div><div class="rsb" id="stats"></div></div>
    <div class="rs"><div class="rst" onclick="this.nextElementSibling.classList.toggle('hide')">👤 角色 ▼</div><div class="rsb" id="chars"></div></div>
    <div class="rs"><div class="rst" onclick="this.nextElementSibling.classList.toggle('hide')">🏞 背景 ▼</div><div class="rsb" id="bgs"></div></div>
    <div class="rs"><div class="rst" onclick="this.nextElementSibling.classList.toggle('hide')">🎭 立绘 ▼</div><div class="rsb" id="figs"></div></div>
    <div class="rs"><div class="rst" onclick="this.nextElementSibling.classList.toggle('hide')">🎵 音频 ▼</div><div class="rsb" id="audio"></div></div>
    <div class="rs"><div class="rst" onclick="this.nextElementSibling.classList.toggle('hide')">🔀 分支 ▼</div><div class="rsb" id="brs"></div></div>
    <div class="rs"><div class="rst" onclick="this.nextElementSibling.classList.toggle('hide')">📐 变量 ▼</div><div class="rsb" id="vars"></div></div>
  </div>
</div>

<div class="sb">
  <span class="it" id="siFile">📄 -</span>
  <span class="it" id="siLines">📏 0行</span>
  <span class="it svok" id="siSave">● 就绪</span>
  <span class="it git" id="siGit" onclick="refreshGit()">🔀 Git</span>
  <span style="margin-left:auto;color:var(--muted);" id="siTime"></span>
</div>

<!-- 对话框构建器 -->
<div class="mod" id="dlgMod">
  <div>
    <h3>💬 对话框构建器</h3>
    <div class="row"><div><div class="lbf">角色名</div><input id="dc"></div><div><div class="lbf">位置</div><select id="dp"><option value="">中心</option><option>-left</option><option>-right</option></select></div></div>
    <div class="lbf">对话内容</div><textarea id="dt" rows="2" placeholder="对话内容..."></textarea>
    <div class="row"><div><div class="lbf">配音文件</div><input id="dv" placeholder="可选"></div><div><div class="lbf">立绘切换</div><input id="df" placeholder="可选(.png)"></div></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;font-size:11px;margin:6px 0;">
      <label><input type="checkbox" id="dn">-next</label>
      <label><input type="checkbox" id="dnt">-notend</label>
      <label><input type="checkbox" id="dcc">-concat</label>
    </div>
    <div class="act">
      <button class="btn" onclick="document.getElementById('dlgMod').classList.remove('s')">取消</button>
      <button class="btn a" onclick="buildDialog()">插入</button>
    </div>
  </div>
</div>

<!-- AI 面板 -->
<div class="mod" id="aiMod">
  <div style="width:560px">
    <h3>🤖 AI 写剧本</h3>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <select id="aiBackend" onchange="updateAIHint()" style="width:auto">
        <option value="chrome">Chrome 内置 (离线)</option>
        <option value="api">API (DeepSeek等)</option>
      </select>
      <input id="aiKey" placeholder="API Key (sk-...)" style="flex:1;display:none">
      <input id="aiEndpoint" placeholder="https://api.openai.com/v1" style="flex:1;display:none">
      <button class="btn s" onclick="toggleAISettings()">⚙</button>
    </div>
    <div id="aiHint" style="font-size:11px;color:var(--muted);margin-bottom:6px"></div>
    <div class="lbf">描述你想写的剧情</div>
    <textarea id="aiPrompt" rows="3" placeholder="例如：陈泽和王妍在教室大吵一架，陈泽先开口道歉，王妍还是不理他..."></textarea>
    <div style="font-size:11px;color:var(--muted);margin:4px 0">
      快捷：<a href="#" onclick="document.getElementById('aiPrompt').value='写一段陈泽向王妍表白的剧情，有选项分支';return false" style="color:var(--pri)">表白</a> ·
      <a href="#" onclick="document.getElementById('aiPrompt').value='写一段角色发现手机没电的搞笑日常';return false" style="color:var(--pri)">搞笑</a> ·
      <a href="#" onclick="document.getElementById('aiPrompt').value='写一段吵架后冷战的剧情，最后有人打破沉默';return false" style="color:var(--pri)">冷战</a> ·
      <a href="#" onclick="syntaxCheck()" style="color:var(--warn)">语法检查</a>
    </div>
    <pre id="aiOut" style="background:#f8fafc;border:1px solid var(--bd);border-radius:5px;padding:10px;font:12px/1.5 Consolas,monospace;max-height:240px;overflow-y:auto;white-space:pre-wrap;color:var(--tx);min-height:40px"></pre>
    <div class="act">
      <button class="btn" onclick="document.getElementById('aiMod').classList.remove('s')">取消</button>
      <button class="btn" onclick="insAI()">📥 插入到编辑器</button>
      <button class="btn a" onclick="callAI()">🪄 生成</button>
    </div>
  </div>
</div>

<script>
const API='http://localhost:3003';
let activeFile=null,saveTimer=null,online=false;

// ==== 文件操作 ====
async function api(url,opts={}){
  const r=await fetch(API+url,{headers:{'Content-Type':'application/json'},...opts});
  return r.json();
}
function setOnline(v){
  online=v;
  document.getElementById('alert').classList.toggle('show',!v);
  const el=document.getElementById('siSave');
  el.className=v?'it svok':'it sverr';
  el.textContent=v?'● 已连接':'✕ 离线';
}
async function loadFiles(){
  try{
    const d=await api('/api/files');
    if(!d.success)throw new Error(d.error);
    setOnline(true);
    document.getElementById('fl').innerHTML=d.files.map(f=>
      `<div class="fi" onclick="openFile('${f.name}')">📄 ${f.name}<span class="sz">${(f.size/1024).toFixed(1)}KB</span></div>`
    ).join('');
    if(d.files.length)openFile(d.files[0].name);
  }catch(e){setOnline(false);}
}
async function openFile(name){
  try{
    const d=await api('/api/read?file='+encodeURIComponent(name));
    if(!d.success)throw new Error(d.error);
    document.getElementById('ta').value=d.content;
    activeFile=name;
    document.getElementById('siFile').textContent='📄 '+name;
    updLines();
    document.querySelectorAll('.fi').forEach(el=>el.classList.toggle('on',el.textContent.includes(name)));
    analyze();
  }catch(e){alert('加载失败:'+e.message);}
}
async function saveNow(){
  if(!activeFile)return;
  const content=document.getElementById('ta').value;
  try{
    const el=document.getElementById('siSave');
    el.className='it svsav';el.textContent='⟳ 保存中...';
    const d=await api('/api/save',{method:'POST',body:JSON.stringify({file:activeFile,content})});
    if(d.success){el.className='it svok';el.textContent='✓ 已保存 ('+new Date().toLocaleTimeString('zh-CN')+')';updLines();}
    else{el.className='it sverr';el.textContent='✕ 保存失败';}
  }catch(e){setOnline(false);}
}
function autoSave(){
  clearTimeout(saveTimer);
  if(!activeFile||!online)return;
  saveTimer=setTimeout(async()=>{
    const content=document.getElementById('ta').value;
    try{
      const d=await api('/api/save',{method:'POST',body:JSON.stringify({file:activeFile,content})});
      const el=document.getElementById('siSave');
      if(d.success){el.className='it svok';el.textContent='✓ 已保存';}
      else{el.className='it sverr';el.textContent='✕ 失败';}
    }catch(e){setOnline(false);}
  },2000);
}
async function newFile(){
  const name=prompt('文件名:','xinjuqing.txt');
  if(!name)return;
  const content='; '+name+'\n\n';
  try{await api('/api/create',{method:'POST',body:JSON.stringify({file:name,content})});loadFiles();openFile(name);}
  catch(e){activeFile=name;document.getElementById('ta').value=content;document.getElementById('siFile').textContent='📄 '+name+' (离线)';updLines();}
}
function updLines(){document.getElementById('siLines').textContent='📏 '+document.getElementById('ta').value.split('\n').length+'行';}
function ins(text){const ta=document.getElementById('ta');const s=ta.selectionStart;ta.value=ta.value.slice(0,s)+text+ta.value.slice(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+text.length;ta.focus();updLines();autoSave();}

// ==== 编辑器事件 ====
document.getElementById('ta').addEventListener('input',()=>{updLines();autoSave();});
document.getElementById('ta').addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();ins('  ');}});
document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='s'){e.preventDefault();saveNow();}if(e.ctrlKey&&e.key==='d'){e.preventDefault();openDialogBuilder();}});

// ==== 拖拽导入 ====
let dc=0;
document.addEventListener('dragenter',e=>{e.preventDefault();dc++;});
document.addEventListener('dragleave',()=>{dc--;if(!dc)document.body.style.outline='';});
document.addEventListener('dragover',e=>{e.preventDefault();document.body.style.outline='2px dashed var(--pri)';});
document.addEventListener('drop',async e=>{
  e.preventDefault();dc=0;document.body.style.outline='';
  for(const f of e.dataTransfer.files){
    if(f.name.endsWith('.txt')){
      const c=await f.text();
      document.getElementById('ta').value=c;activeFile=f.name;
      document.getElementById('siFile').textContent='📄 '+f.name+' (拖入)';
      updLines();analyze();
      if(online){try{await api('/api/save',{method:'POST',body:JSON.stringify({file:f.name,content:c})});}catch(e){}}
    }
  }
});

// ==== 分析 ====
function parse(content){
  const ls=content.split('\n'),r={chars:new Set,bgs:[],figs:[],bgms:[],sfx:[],vids:[],choices:[],labels:[],jumps:[],vars:{},iss:[],lines:ls.length};
  const cr=/^(changeBg|changeFigure|bgm|playEffect|playVideo|changeScene|callScene|jumpLabel|label|choose|setVar|end|wait)\s*:/;
  ls.forEach((l,i)=>{
    const ln=i+1,t=l.trim();if(!t||t.startsWith(';'))return;
    if(t.includes('：'))r.iss.push({l:ln,m:'中文冒号→应用英文:'});
    const cm=t.match(cr);
    if(cm){
      const cmd=cm[1],rest=t.slice(cm[0].length);
      switch(cmd){
        case'changeBg':{const f=rest.split(/[\s-]/)[0];if(f)r.bgs.push({f,l:ln});break}
        case'changeFigure':{const f=rest.split(/[\s-]/)[0];if(f)r.figs.push({f,l:ln,pos:rest.includes('-left')?'L':rest.includes('-right')?'R':'C'});break}
        case'bgm':{const f=rest.split(/[\s-]/)[0];if(f)r.bgms.push({f,l:ln});break}
        case'playEffect':{const f=rest.split(/[\s-]/)[0];if(f)r.sfx.push({f,l:ln});break}
        case'playVideo':{const f=rest.split(/[\s-]/)[0];if(f)r.vids.push({f,l:ln});break}
        case'label':{const lb=rest.split(';')[0].trim();if(lb)r.labels.push({n:lb,l:ln});break}
        case'jumpLabel':{const lb=rest.split(';')[0].trim();if(lb)r.jumps.push({t:lb,l:ln});break}
        case'changeScene':case'callScene':{const tg=rest.split(';')[0].trim();if(tg)r.jumps.push({tp:cmd,t:tg,l:ln});break}
        case'choose':{
          const ps=rest.replace(/\(([^)]+)\)\[([^\]]+)\]->/g,'[C]→').split('|');
          r.choices.push({l:ln,opts:ps.map(p=>{const m=p.trim().match(/^(.+?)\s*:\s*(.+)$/);return m?{text:m[1].trim(),tgt:m[2].trim()}:null;}).filter(Boolean)});
          break;
        }
        case'setVar':{const eq=rest.indexOf('=');if(eq>0)r.vars[rest.slice(0,eq).trim()]=rest.slice(eq+1).split(/[;\-]/)[0].trim();break}
      }
      return;
    }
    const dm=t.match(/^([^\s:]+):/);
    if(dm&&dm[1].length<10)r.chars.add(dm[1]);
  });
  r.chars=[...r.chars];return r;
}
function analyze(){
  const r=parse(document.getElementById('ta').value);
  document.getElementById('rp').style.display='block';
  document.getElementById('stats').innerHTML=`<div style="display:flex;justify-content:space-between;padding:1px 0">总行数<span style="font-weight:600;color:var(--pri)">${r.lines}</span></div><div style="display:flex;justify-content:space-between;padding:1px 0">角色<span style="font-weight:600;color:var(--pri)">${r.chars.length}</span></div><div style="display:flex;justify-content:space-between;padding:1px 0">背景<span style="font-weight:600;color:var(--pri)">${r.bgs.length}</span></div><div style="display:flex;justify-content:space-between;padding:1px 0">立绘<span style="font-weight:600;color:var(--pri)">${r.figs.length}</span></div><div style="display:flex;justify-content:space-between;padding:1px 0">分支<span style="font-weight:600;color:var(--pri)">${r.choices.length}</span></div><div style="display:flex;justify-content:space-between;padding:1px 0">标签<span style="font-weight:600;color:var(--pri)">${r.labels.length}</span></div><div style="display:flex;justify-content:space-between;padding:1px 0">问题<span style="font-weight:600;color:${r.iss.length?'var(--bad)':'var(--good)'}">${r.iss.length}</span></div>${r.iss.length?r.iss.map(i=>`<div class="tag e" style="margin-top:4px">⚠L${i.l}:${i.m}</div>`).join(''):''}`;
  document.getElementById('chars').innerHTML=r.chars.length?r.chars.map(c=>`<span class="tag c">👤${c}</span>`).join(''):'<span style="color:var(--muted)">-</span>';
  document.getElementById('bgs').innerHTML=r.bgs.length?r.bgs.map(b=>`<span class="tag b">🏞${b.f}</span>`).join(''):'<span style="color:var(--muted)">-</span>';
  document.getElementById('figs').innerHTML=r.figs.length?r.figs.map(f=>`<span class="tag f">🎭${f.f}<small>(${f.pos})</small></span>`).join(''):'<span style="color:var(--muted)">-</span>';
  document.getElementById('audio').innerHTML=[...r.bgms.map(b=>`<span class="tag m">🎵${b.f}</span>`),...r.sfx.map(s=>`<span class="tag m">🔊${s.f}</span>`)].join('')||'<span style="color:var(--muted)">-</span>';
  document.getElementById('brs').innerHTML=r.choices.length?r.choices.map(c=>`<div style="margin:2px 0;padding:4px;background:#f9fafb;border-radius:4px"><b style="font-size:10px">L${c.l}:</b> ${c.opts.map(o=>`→${o.text}➜<span style="color:var(--pri)">${o.tgt}</span>`).join(' | ')}</div>`).join(''):'<span style="color:var(--muted)">-</span>';
  document.getElementById('vars').innerHTML=Object.keys(r.vars).length?Object.entries(r.vars).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:1px 0">${k}<span style="font-weight:600;color:var(--pri)">${v}</span></div>`).join(''):'<span style="color:var(--muted)">-</span>';
  // 结构树
  const st=document.getElementById('st');st.style.display='block';
  let sh='<div class="lh">🌲 结构</div>';
  r.labels.forEach(l=>{sh+=`<div class="l" onclick="jmp(${l.l})"><span class="d lb"></span>🏷${l.n}<span style="color:var(--muted);margin-left:auto;font-size:10px">L${l.l}</span></div>`;});
  r.choices.forEach(c=>{sh+=`<div class="l" onclick="jmp(${c.l})"><span class="d ch"></span>🔀选择<span style="color:var(--muted);margin-left:auto;font-size:10px">L${c.l}</span></div>`;});
  st.innerHTML=sh;
}
function toggleRight(){const r=document.getElementById('rp');r.style.display=r.style.display==='none'?'block':'none';if(r.style.display!=='none')analyze();}
function jmp(n){const ta=document.getElementById('ta'),ls=ta.value.split('\n');let p=0;for(let i=0;i<n-1;i++)p+=ls[i].length+1;ta.focus();ta.setSelectionRange(p,p);ta.scrollTop=Math.max(0,(n-5)*21);}

// ==== 对话框构建器 ====
function openDialogBuilder(){document.getElementById('dlgMod').classList.add('s');}
function buildDialog(){
  const c=document.getElementById('dc').value||'',pos=document.getElementById('dp').value||'';
  const t=document.getElementById('dt').value||'',v=document.getElementById('dv').value||'';
  const f=document.getElementById('df').value||'';
  let opts='';
  if(document.getElementById('dn').checked)opts+=' -next';
  if(document.getElementById('dnt').checked)opts+=' -notend';
  if(document.getElementById('dcc').checked)opts+=' -concat';
  let line='';
  if(f)line+=`changeFigure:${f} ${pos};\n`;
  line+=c?`${c}:"${t}"${v?' -vocal='+v:''}${opts};`:`:"${t}";`;
  ins('\n'+line);
  document.getElementById('dlgMod').classList.remove('s');
}

// ==== Git ====
async function refreshGit(){
  try{
    const d=await api('/api/git/status');
    if(d.success){
      const ch=d.status?d.status.split('\n').filter(l=>l.trim()).length:0;
      document.getElementById('siGit').textContent='🔀 '+d.branch+' | '+ch+'变更';
      document.getElementById('siGit').style.color=ch?'var(--warn)':'var(--good)';
    }
  }catch(e){}
}
async function gitCommit(){
  const msg=prompt('提交信息:','update: 更新场景文件');
  if(!msg)return;
  try{const d=await api('/api/git/commit',{method:'POST',body:JSON.stringify({message:msg})});alert(d.success?'✅ 提交成功':'❌ '+d.error);refreshGit();}
  catch(e){alert('连接失败');}
}

// ==== AI 写剧本 ====
const WGS=`你是 WebGAL 脚本专家。根据用户描述生成 WebGAL 剧本片段，语法规则：
; 注释  |  :旁白;  |  角色名:"台词";  |  角色名:"台词" -配音.mp3;
changeBg:背景.png;  |  changeFigure:立绘.png -center|-left|-right;
choose:选项文字:标签A|选项文字:标签B;  |  label:名称;  |  jumpLabel:名称;
setVar:love=0;  |  setVar:love=love+5;  |  bgm:音乐.mp3;  |  playVideo:视频.mp4;
wait:1000;  |  end;  |  changeScene:文件名.txt;
要求：只输出脚本，不要解释，不要 markdown 代码块标记。`;

let aiCache='';

async function callAI(){
  const prompt=document.getElementById('aiPrompt').value.trim();
  if(!prompt)return;
  const out=document.getElementById('aiOut');
  out.textContent='生成中...';
  const ctx='当前剧本:\n'+document.getElementById('ta').value.slice(-800);
  const sys=`${WGS}\n${ctx}`;
  
  // 1) Chrome 内置 AI
  const bk=document.getElementById('aiBackend').value;
  if(bk==='chrome'){
    try{
      if(!window.ai)throw 0;
      const s=await window.ai.createTextSession();
      const r=await s.prompt(`${sys}\n用户需求：${prompt}`);
      aiCache=r.trim();out.textContent=aiCache;
      return;
    }catch(e){out.textContent='Chrome 内置不可用，切换到 API 模式';}
  }
  
  // 2) API
  const key=localStorage.getItem('ai_key')||'';
  const ep=localStorage.getItem('ai_endpoint')||'https://api.openai.com/v1';
  const model=localStorage.getItem('ai_model')||'gpt-3.5-turbo';
  if(!key){out.textContent='请先设置 API Key (点 ⚙)';return}
  
  try{
    const r=await fetch(ep+'/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model,messages:[{role:'system',content:sys},{role:'user',content:prompt}],temperature:.7,max_tokens:800})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    aiCache=d.choices[0].message.content.trim();
    out.textContent=aiCache;
  }catch(e){out.textContent='API 错误: '+e.message}
}

function syntaxCheck(){
  document.getElementById('aiPrompt').value='check';
  document.getElementById('aiOut').textContent='检查中...';
  const ta=document.getElementById('ta').value;
  const sys=`你是 WebGAL 语法检查器。指出以下脚本的语法问题（分号不匹配、引号不匹配、命令参数错误等）。没有问题时回复"✓ 未发现语法问题"。只输出检查结果。`;
  callAIWith(sys,ta);
}
async function callAIWith(sys,user){
  const out=document.getElementById('aiOut'),bk=document.getElementById('aiBackend').value;
  if(bk==='chrome'){
    try{
      if(!window.ai)throw 0;
      const s=await window.ai.createTextSession();
      aiCache=(await s.prompt(`${sys}\n${user}`)).trim();
      out.textContent=aiCache;return;
    }catch(e){}
  }
  const key=localStorage.getItem('ai_key')||'';
  const ep=localStorage.getItem('ai_endpoint')||'https://api.openai.com/v1';
  const model=localStorage.getItem('ai_model')||'gpt-3.5-turbo';
  if(!key){out.textContent='请先设置 API Key';return}
  try{
    const r=await fetch(ep+'/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model,messages:[{role:'system',content:sys},{role:'user',content:user}],temperature:0,max_tokens:500})
    });
    const d=await r.json();
    aiCache=d.choices[0].message.content.trim();
    out.textContent=aiCache;
  }catch(e){out.textContent='API 错误: '+e.message}
}

function insAI(){
  if(!aiCache)return;
  ins('\n'+(aiCache.startsWith(';')||aiCache.startsWith(':')||aiCache.startsWith('change')||aiCache.startsWith('label')||aiCache.startsWith('setVar')||aiCache.startsWith('choose')?aiCache:'; '+aiCache)+'\n');
  document.getElementById('aiMod').classList.remove('s');
}

function openAIPanel(){
  document.getElementById('aiMod').classList.add('s');
  updateAIHint();
}
function toggleAISettings(){
  const k=document.getElementById('aiKey'),e=document.getElementById('aiEndpoint');
  [k,e].forEach(el=>el.style.display=el.style.display==='none'?'block':'none');
  if(k.style.display!=='none'){
    k.value=localStorage.getItem('ai_key')||'';
    e.value=localStorage.getItem('ai_endpoint')||'https://api.openai.com/v1';
  }
}
function updateAIHint(){
  const bk=document.getElementById('aiBackend').value;
  const hint=document.getElementById('aiHint'),k=document.getElementById('aiKey'),e=document.getElementById('aiEndpoint');
  if(bk==='chrome'){
    hint.textContent='使用 Chrome 127+ 内置 Gemini Nano（离线免费），需开启 chrome://flags/#optimization-guide-on-device-model';
    k.style.display='none';e.style.display='none';
  }else{
    hint.textContent='兼容 OpenAI/DeepSeek 等。默认 https://api.openai.com/v1，可用 chat/completions 端点';
    k.style.display='block';e.style.display='block';
  }
}
document.getElementById('aiKey').addEventListener('change',function(){localStorage.setItem('ai_key',this.value);document.getElementById('aiBadge').textContent='🤖 AI 就绪 (API)';document.getElementById('aiBadge').style.color='var(--good)'});
document.getElementById('aiEndpoint').addEventListener('change',function(){localStorage.setItem('ai_endpoint',this.value)});

(async function init(){

  const badge=document.getElementById('aiBadge');
  if(window.ai && window.ai.createTextSession){
    try{const s=await window.ai.createTextSession();const r=await s.prompt('hi');if(r){badge.textContent='🤖 就绪 (Chrome)';badge.style.color='var(--good');return}}catch(e){}
  }
  if(localStorage.getItem('ai_key')){badge.textContent='🤖 就绪 (API)';badge.style.color='var(--good');return}
  badge.textContent='🤖 未配置';badge.style.color='var(--warn)';

  // 服务器自动重连
  let retries=0;
  (function retry(){retries++;if(retries>30||online)return;
    setTimeout(async()=>{
      if(!online){try{const d=await api('/api/status');if(d.success)setOnline(true);}catch(e){}}
      if(!online)retry();
    },4000);
  })();
})();
